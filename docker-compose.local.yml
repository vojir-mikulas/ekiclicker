# =========================================================================
# Vývojový overlay — přidá lokální Postgres, ať stack běží i bez externí DB.
# Použij společně se základním souborem:
#
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Data DB přežijí restart ve volume `eki-db`.
# =========================================================================
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eki
      POSTGRES_PASSWORD: eki
      POSTGRES_DB: ekiclicker
    volumes:
      - eki-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eki -d ekiclicker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    environment:
      DATABASE_URL: postgres://eki:eki@db:5432/ekiclicker
    depends_on:
      db:
        condition: service_healthy

volumes:
  eki-db:
